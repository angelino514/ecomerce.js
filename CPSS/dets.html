<!DOCTYPE html>
<html lang="Pt-Br">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../ASS/style.css">
   <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..200" />
   <title> E-Store </title>
</head>

<body>

   <header class="dt-hedaer">
      <div class="face">
         <button class="button_Back">
            <span class="material-symbols-outlined"> arrow_back_ios </span>
         </button>

         <div class="navbar-dts">

            <button class="ver_fovorito link_carrinho">
               <span class="material-symbols-outlined">
                  favorite
               </span>

               <span class="numero_favorito">0</span>
            </button>

            <button class="verItensCarrinho link_carrinho">
               <span class="material-symbols-outlined"> shopping_bag </span>
               <span class="numeros_Itens numeros_carrinho"> </span>
            </button>
         </div>
      </div>
   </header>


   <main class="main-dts">
      <section class="face" id="id_detalhes_face"></section>

      <!-- section para carrinho de compra  -->
      <section class="carrinho">
         <div class="voltar">
            <div class="face">
               <button class="voltar_Button">
                  voltar
               </button>
            </div>
         </div>

         <div class="face" id="faceItens">
         </div>

         <!-- confirmar dados de compra  -->
         <div class="dadosDetalhes">
            <div class="dOremoverDetalhes">

            </div>

            <div class="face" id="face_Compra">
            </div>

         </div>

         <div class="dO_pagar">
            <button class="pagamento">
               comprar
            </button>
         </div>
      </section>

      <section class="sect_avisoAdicionar">
         <article class="face">
            <div class="processo"></div>
            <p class="avisoAdicionar"> Item adiconado ao carrinho </p>
         </article>
      </section>
   </main>

   <section class="ver_itens_carrinho">
      <div class="face ver_container">
         <article class="art_ver_remove">
            <button class="material-symbols-outlined b_ver_remover"> close </button>
         </article>

         <article class="art_container_ver">

         </article>
      </div>
   </section>

   <section class="sect_favorito">

      <div class="content_face">
         <div class="face face_container_button">
            <button class="remover_sect_favorito">
               <span class="material-symbols-outlined"> close </span>
            </button>
         </div>
      </div>

      <div class="face face_favorito"></div>
   </section>

   <script type="module" src="../JSS/dets.js"></script>
</body>

</html>
