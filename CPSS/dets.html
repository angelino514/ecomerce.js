<!DOCTYPE html>
<html lang="Pt-Br">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../ASS/style.css">
   <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..200" />
   <title> E-Store </title>
</head>

<body>

   <header class="dt-hedaer">
      <div class="face">
         <button class="button_Back">
            <span class="material-symbols-outlined"> arrow_back_ios </span>
         </button>

         <div class="navbar-dts">

            <button class="verItens link_carrinho" value="favoritos">
               <span class="material-symbols-outlined">
                  favorite
               </span>

               <span class="numero_favorito numero_itens" data-nome="favorito">0</span>
            </button>

            <button class="verItens link_carrinho" value="carrinho">
               <span class="material-symbols-outlined"> shopping_bag </span>
               <span class="verItens numeros_carrinho numero_itens" data-nome="carrinho"> </span>
            </button>
         </div>
      </div>
   </header>



   <main class=" main-dts main_gerl_container">
      <section class="face" id="id_detalhes_face"></section>

      <section class="sect_avisoAdicionar">
         <article class="face">
            <div class="processo"></div>
            <p class="avisoAdicionar"> Item adiconado ao carrinho </p>
         </article>
      </section>
   </main>


   <section class="section_list_geral">

      <div class="container_face_list face">

         <div class="container_remove_list">
            <button class="verItens" value="remover">
               <span class="material-symbols-outlined b_ver_remover"> close </span>
            </button>
         </div>

         <div class="container_auto_list">

         </div>

      </div>

   </section>

   <script type="module" src="../JSS/dets.js"></script>
</body>

</html>
